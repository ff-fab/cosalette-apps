# Pre-commit hooks: Automated checks before each commit
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # EditorConfig: Validate all files match .editorconfig settings
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        name: EditorConfig (whitespace & encoding)
        alias: ec

  # Basic checks (trailing whitespace, YAML validity, etc.)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML syntax
        args: ['--unsafe']
      - id: check-json
        name: Check JSON syntax
        exclude: '(\.devcontainer/devcontainer\.json|\.vscode/(settings|launch)\.json)$'
      - id: check-toml
        name: Check TOML syntax
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys

  # Codespell: Catch common misspellings across the entire repo
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: Codespell (spell check)
        args: ['--ignore-words-list', 'hass,oder,modul']
        exclude: |
          (?x)^(
            old/.*|
            .*\.lock
          )$

  # Prettier: Format JavaScript, TypeScript, JSON, Markdown, YAML
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0 # Keep v3 stable; v4 is alpha
    hooks:
      - id: prettier
        name: Prettier (JS, TS, JSON, MD, YAML)
        types_or:
          - javascript
          - jsx
          - ts
          - tsx
          - json
          - markdown
          - yaml
        exclude: |
          (?x)^(
            \.vscode/settings\.json$|
            apps/.*/packages/.*|
            .*\.prompt\.md$|
            .*\.instructions\.md$|
            CHANGELOG\.md$
          )$

  # Ruff: Lint and format Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        name: Ruff (lint Python)
        args: ['--fix']
      - id: ruff-format
        name: Ruff (format Python)

  # ty: Type checking for Python (Astral)
  # Config lives in [tool.ty] in pyproject.toml.
  # Per-app type checking runs via task <app>:typecheck (needs per-app dependencies).
  # Global pre-commit ty is scoped to root packages only.
  - repo: local
    hooks:
      - id: ty
        name: ty (type check Python)
        entry: uv run ty check packages/src/
        language: system
        types: [python]
        pass_filenames: false

  # GPL headers: Ensure GPL-licensed files have copyright headers
  # Reads REUSE.toml to discover GPL paths — scales to any future GPL app.
  - repo: local
    hooks:
      - id: gpl-headers
        name: GPL headers (REUSE-driven)
        entry: uv run scripts/add_gpl_headers.py --check
        language: system
        always_run: true
        pass_filenames: false

  # REUSE: Verify license annotations cover all files
  - repo: https://github.com/fsfe/reuse-tool
    rev: v5.0.2
    hooks:
      - id: reuse
        name: REUSE (license compliance)

  # Beads (bd): Guard pushes and keep git in sync
  # pre-push: FAILS if .beads/ has uncommitted changes (forces commit-before-push)
  # post-merge: pulls upstream Dolt changes after git pull
  - repo: local
    hooks:
      - id: bd-check-pre-push
        name: Beads state check (pre-push)
        entry: bash -c 'if [ ! -d .beads ] || ! command -v bd >/dev/null 2>&1; then exit 0; fi; if [ -n "$(git status --porcelain -- .beads/ 2>/dev/null)" ]; then echo "Uncommitted beads changes detected. Run git add .beads/ && git commit before pushing."; exit 1; fi'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
      - id: bd-pull-post-merge
        name: Beads pull (post-merge)
        entry: bash -c 'if [ ! -d .beads ] || ! command -v bd >/dev/null 2>&1; then exit 0; fi; CHANGED=$(git diff-tree -r --name-only ORIG_HEAD HEAD -- ".beads/" 2>/dev/null); if [ -n "$CHANGED" ]; then echo "Beads data updated by merge, pulling..."; bd dolt pull 2>/dev/null || true; fi'
        language: system
        always_run: true
        pass_filenames: false
        stages: [post-merge]

# Configuration options
default_language_version:
  python: python3.14

fail_fast: false # Run all hooks, don't stop at first failure
