name: 'Run in DevContainer'
description: >
  Prepare runner caches, log in to GHCR, set up Buildx, and run a command
  inside the project devcontainer via devcontainers/ci.

inputs:
  run-cmd:
    description: 'Command to execute inside the devcontainer'
    required: true
  image:
    description: 'DevContainer image name (without tag)'
    required: false
    default: 'ghcr.io/ff-fab/cosalette-apps-devcontainer'
  token:
    description: 'GitHub token for GHCR login'
    required: true
  cargo-cache:
    description: "Restore/save cargo registry cache ('true' to enable)"
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Prepare workspace cache directories
      shell: bash
      run: mkdir -p .cache/uv .cache/pre-commit .cache/cargo-home/registry/index .cache/cargo-home/registry/cache .cache/cargo-home/git/db target

    - name: Restore uv cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: .cache/uv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: uv-${{ runner.os }}-
        save-always: true

    - name: Restore pre-commit cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: .cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: pre-commit-${{ runner.os }}-
        save-always: true

    - name: Restore cargo registry cache
      if: inputs.cargo-cache == 'true'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: |
          .cache/cargo-home/registry/index
          .cache/cargo-home/registry/cache
          .cache/cargo-home/git/db
        key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-registry-${{ runner.os }}-
        save-always: true

    - name: Restore cargo target cache
      if: inputs.cargo-cache == 'true'
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: target
        key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-target-${{ runner.os }}-

    - name: Log in to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

    - name: Run command in devcontainer
      uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5  # v0.3
      env:
        UV_CACHE_DIR: ${{ github.workspace }}/.cache/uv
        PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
        CARGO_HOME: ${{ github.workspace }}/.cache/cargo-home
        CARGO_TARGET_DIR: ${{ github.workspace }}/target
      with:
        imageName: ${{ inputs.image }}
        cacheFrom: ${{ inputs.image }}
        push: never
        runCmd: ${{ inputs.run-cmd }}

    - name: Save cargo target cache
      if: inputs.cargo-cache == 'true' && always()
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: target
        key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
