name: Documentation
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'apps/*/docs/**'
      - 'apps/*/zensical.toml'
  pull_request:
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'apps/*/docs/**'
      - 'apps/*/zensical.toml'

permissions:
  pages: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter.outputs.root }}
      gas2mqtt: ${{ steps.filter.outputs.gas2mqtt }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            root:
              - 'docs/**'
              - 'zensical.toml'
            gas2mqtt:
              - 'apps/gas2mqtt/docs/**'
              - 'apps/gas2mqtt/zensical.toml'

  build-root:
    needs: detect
    if: needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group docs
      - run: task docs:build

  deploy-root:
    needs: build-root
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group docs
      - run: task docs:build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true

  build-gas2mqtt:
    needs: detect
    if: needs.detect.outputs.gas2mqtt == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group docs
      - run: task gas2mqtt:docs:build

  deploy-gas2mqtt:
    needs: build-gas2mqtt
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group docs
      - run: task gas2mqtt:docs:build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/gas2mqtt/site
          destination_dir: gas2mqtt
          keep_files: true
