name: Documentation
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'apps/*/docs/**'
      - 'apps/*/zensical.toml'
  pull_request:
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'apps/*/docs/**'
      - 'apps/*/zensical.toml'

env:
  DEVCONTAINER_IMAGE: ghcr.io/ff-fab/cosalette-apps-devcontainer

permissions:
  pages: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter.outputs.root }}
      gas2mqtt: ${{ steps.filter.outputs.gas2mqtt }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            root:
              - 'docs/**'
              - 'zensical.toml'
            gas2mqtt:
              - 'apps/gas2mqtt/docs/**'
              - 'apps/gas2mqtt/zensical.toml'

  build-root:
    needs: detect
    if: needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build root docs inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task docs:build

  deploy-root:
    needs: build-root
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build root docs inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task docs:build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true

  build-gas2mqtt:
    needs: detect
    if: needs.detect.outputs.gas2mqtt == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build gas2mqtt docs inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task gas2mqtt:docs:build

  deploy-gas2mqtt:
    needs: build-gas2mqtt
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build gas2mqtt docs inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task gas2mqtt:docs:build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/gas2mqtt/site
          destination_dir: gas2mqtt
          keep_files: true
