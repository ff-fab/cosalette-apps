name: Documentation
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'apps/*/docs/**'
      - 'apps/*/zensical.toml'
  pull_request:
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'apps/*/docs/**'
      - 'apps/*/zensical.toml'
  workflow_dispatch:

env:
  DEVCONTAINER_IMAGE: ghcr.io/ff-fab/cosalette-apps-devcontainer

permissions:
  contents: write
  packages: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.root == 'true' }}
      apps: ${{ steps.apps.outputs.apps }}
    steps:
      - uses: actions/checkout@v6

      # Discover all apps that have a zensical.toml (i.e. have docs)
      - name: Discover doc-enabled apps
        id: discover
        run: |
          apps=$(ls -d apps/*/zensical.toml 2>/dev/null | xargs -I{} dirname {} | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "apps=$apps" >> "$GITHUB_OUTPUT"

      # Build dorny/paths-filter config dynamically from discovered apps
      - name: Build path filters
        id: build-filters
        run: |
          filters="root:"$'\n'"  - 'docs/**'"$'\n'"  - 'zensical.toml'"
          for app in $(echo '${{ steps.discover.outputs.apps }}' | jq -r '.[]'); do
            filters="$filters"$'\n'"${app}:"$'\n'"  - 'apps/${app}/docs/**'"$'\n'"  - 'apps/${app}/zensical.toml'"
          done
          # Write to file to avoid quoting issues
          echo "$filters" > /tmp/path-filters.yml

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: /tmp/path-filters.yml

      # Build the list of apps whose docs changed (exclude 'root')
      # On workflow_dispatch, build all docs (path detection is unreliable)
      - name: Build changed-app list
        id: apps
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "apps=${{ steps.discover.outputs.apps }}" >> "$GITHUB_OUTPUT"
          else
            apps=$(echo '${{ steps.filter.outputs.changes }}' | jq -c '[.[] | select(. != "root")]')
            echo "apps=$apps" >> "$GITHUB_OUTPUT"
          fi

  build-root:
    needs: detect
    if: needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build root docs inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task docs:build

  deploy-root:
    needs: build-root
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build root docs inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task docs:build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true

  # Per-app docs dispatched via matrix
  app-docs:
    needs: detect
    if: needs.detect.outputs.apps != '[]'
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
      fail-fast: false
    uses: ./.github/workflows/docs-app.yml
    with:
      app: ${{ matrix.app }}
      deploy: ${{ github.event_name != 'pull_request' }}
