name: Documentation Preview
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'apps/*/docs/**'
      - 'apps/*/zensical.toml'
  pull_request_target:
    types: [closed]
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'apps/*/docs/**'
      - 'apps/*/zensical.toml'

env:
  DEVCONTAINER_IMAGE: ghcr.io/ff-fab/cosalette-apps-devcontainer
  SURGE_DOMAIN: cosalette-apps-pr-${{ github.event.pull_request.number }}.surge.sh

permissions:
  contents: read
  packages: read

concurrency:
  group: docs-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Discover doc-enabled apps
        id: discover
        run: |
          apps=$(ls -d apps/*/zensical.toml 2>/dev/null | xargs -I{} dirname {} | xargs -I{} basename {} | tr '\n' ' ')
          echo "apps=$apps" >> "$GITHUB_OUTPUT"

      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all docs inside devcontainer
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5  # v0.3
        with:
          cacheFrom: type=registry,ref=${{ env.DEVCONTAINER_IMAGE }}:buildcache
          push: never
          runCmd: |
            task docs:build
            for app in ${{ steps.discover.outputs.apps }}; do
              task "${app}:docs:build"
            done

      - name: Merge into unified site
        run: |
          mkdir -p merged
          rsync -a --exclude='.*' site/ merged/
          for app in ${{ steps.discover.outputs.apps }}; do
            if [ -d "apps/$app/site" ]; then
              mkdir -p "merged/$app"
              rsync -a --exclude='.*' "apps/$app/site/" "merged/$app/"
            fi
          done

      - name: Upload merged site
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: docs-preview
          path: merged
          retention-days: 3

  deploy:
    needs: build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download merged site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: docs-preview
          path: merged

      - name: Install and deploy to Surge
        id: surge
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          if [ -z "$SURGE_TOKEN" ]; then
            echo "::warning::SURGE_TOKEN not set — skipping preview deploy (expected for fork PRs)"
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npm install -g surge
          surge merged/ "$SURGE_DOMAIN" --token "$SURGE_TOKEN"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Build changed-pages list
        if: steps.surge.outputs.deployed == 'true'
        id: changed
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          links=""
          while IFS= read -r file; do
            url=""
            case "$file" in
              docs/*.md|docs/**/*.md)
                # docs/adr/ADR-002.md → /adr/ADR-002/
                slug="${file#docs/}"
                slug="${slug%.md}"
                [[ "$slug" == "index" ]] && url="/"
                [[ "$slug" == */index ]] && url="/${slug%/index}/"
                [[ -z "$url" ]] && url="/${slug}/"
                ;;
              apps/*/docs/*.md|apps/*/docs/**/*.md)
                # apps/gas2mqtt/docs/index.md → /gas2mqtt/
                app="${file#apps/}"
                app="${app%%/*}"
                slug="${file#apps/${app}/docs/}"
                slug="${slug%.md}"
                [[ "$slug" == "index" ]] && url="/${app}/"
                [[ "$slug" == */index ]] && url="/${app}/${slug%/index}/"
                [[ -z "$url" ]] && url="/${app}/${slug}/"
                ;;
            esac
            if [ -n "$url" ]; then
              links="${links}- [${file}](https://${SURGE_DOMAIN}${url})"$'\n'
            fi
          done < <(gh pr diff "$PR_NUMBER" --name-only | grep -E '\.(md|toml)$' || true)
          if [ -z "$links" ]; then
            links="_No individual page links detected — browse the preview URL directly._"
          fi
          # Escape for GITHUB_OUTPUT multiline
          {
            echo "links<<LINKS_EOF"
            echo "$links"
            echo "LINKS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        if: steps.surge.outputs.deployed == 'true'
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e  # v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Documentation Preview

      - name: Post or update preview comment
        if: steps.surge.outputs.deployed == 'true'
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043  # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 📖 Documentation Preview

            🔗 **Preview URL:** https://${{ env.SURGE_DOMAIN }}

            ### Changed Pages
            ${{ steps.changed.outputs.links }}
            _Last updated: ${{ github.event.pull_request.updated_at }} · Build #${{ github.run_number }}_

  # pull_request_target runs in base branch context — safe because this job
  # never checks out or executes PR code, only tears down the Surge domain.
  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Teardown Surge preview
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          if [ -z "$SURGE_TOKEN" ]; then
            echo "::warning::SURGE_TOKEN not set — skipping teardown"
            exit 0
          fi
          npm install -g surge
          surge teardown "$SURGE_DOMAIN" --token "$SURGE_TOKEN"

      - name: Find existing comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e  # v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Documentation Preview

      - name: Update comment to indicate removal
        if: steps.find.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043  # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 📖 Documentation Preview

            ~~https://${{ env.SURGE_DOMAIN }}~~

            Preview has been removed (PR closed).
