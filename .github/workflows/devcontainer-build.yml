# Build and cache the devcontainer image to GHCR.
#
# This is separate from the CI workflow (Separation of Concerns):
# - The image changes rarely (only when dev tooling changes)
# - CI jobs pull the pre-built image instead of building from scratch each run
# - Weekly schedule picks up base image security patches automatically
#
# The image is pushed to
# ghcr.io/ff-fab/cosalette-apps-devcontainer
# and used by ci.yml / ci-app.yml / docs.yml via the devcontainers/ci
# action's cacheFrom parameter.

name: DevContainer Build

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
  schedule:
    # Weekly Monday 06:00 UTC — picks up base image security patches
    - cron: '0 6 * * 1'
  workflow_dispatch: # Manual trigger for bootstrap and ad-hoc rebuilds

permissions:
  contents: read
  packages: write # Required to push to GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build and push devcontainer image
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5  # v0.3
        with:
          imageName: ghcr.io/ff-fab/cosalette-apps-devcontainer
          # Cache layers via dedicated buildcache manifest for faster rebuilds
          cacheFrom: type=registry,ref=ghcr.io/ff-fab/cosalette-apps-devcontainer:buildcache
          cacheTo: type=registry,ref=ghcr.io/ff-fab/cosalette-apps-devcontainer:buildcache,mode=max
          push: always
