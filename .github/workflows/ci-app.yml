name: CI (per-app)
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string

env:
  DEVCONTAINER_IMAGE: ghcr.io/ff-fab/cosalette-apps-devcontainer

concurrency:
  group: ci-${{ inputs.app }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run linting inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task ${{ inputs.app }}:lint

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run type checking inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task ${{ inputs.app }}:typecheck

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run unit tests inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task ${{ inputs.app }}:ci:test:unit
      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: apps/${{ inputs.app }}/coverage.xml
          flags: ${{ inputs.app }}
