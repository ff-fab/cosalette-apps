name: CI (per-app)
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string

env:
  # Image reference used by the devcontainer-run composite action
  DEVCONTAINER_IMAGE: ghcr.io/ff-fab/cosalette-apps-devcontainer

concurrency:
  group: ci-${{ inputs.app }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Run linting inside devcontainer
        uses: ./.github/actions/devcontainer-run
        with:
          run-cmd: task ${{ inputs.app }}:lint
          token: ${{ secrets.GITHUB_TOKEN }}

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Run type checking inside devcontainer
        uses: ./.github/actions/devcontainer-run
        with:
          run-cmd: task ${{ inputs.app }}:typecheck
          token: ${{ secrets.GITHUB_TOKEN }}

  schema:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Validate AsyncAPI schema inside devcontainer
        uses: ./.github/actions/devcontainer-run
        with:
          run-cmd: task ${{ inputs.app }}:schema:check
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Run unit tests inside devcontainer
        uses: ./.github/actions/devcontainer-run
        with:
          run-cmd: task ${{ inputs.app }}:ci:test:unit
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        if: always()
        with:
          files: apps/${{ inputs.app }}/coverage.xml
          flags: ${{ inputs.app }}
      - name: Run integration tests inside devcontainer
        uses: ./.github/actions/devcontainer-run
        with:
          run-cmd: task ${{ inputs.app }}:ci:test:integration
          token: ${{ secrets.GITHUB_TOKEN }}
