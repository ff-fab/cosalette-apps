name: Documentation (per-app)
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string

env:
  DEVCONTAINER_IMAGE: ghcr.io/ff-fab/cosalette-apps-devcontainer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ inputs.app }} docs inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task ${{ inputs.app }}:docs:build
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ inputs.app }}
          path: apps/${{ inputs.app }}/site
          retention-days: 1
