name: Documentation (per-app)
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      deploy:
        required: false
        type: boolean
        default: false

env:
  DEVCONTAINER_IMAGE: ghcr.io/ff-fab/cosalette-apps-devcontainer

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Prepare runner for devcontainer
        run: mkdir -p ~/.ssh
      - name: Log in to GHCR (for devcontainer cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ inputs.app }} docs inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: never
          runCmd: task ${{ inputs.app }}:docs:build
      - uses: peaceiris/actions-gh-pages@v4
        if: inputs.deploy
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/${{ inputs.app }}/site
          destination_dir: ${{ inputs.app }}
          keep_files: true
