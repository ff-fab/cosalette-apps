name: Documentation (per-app)
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string

env:
  # Image reference used by the devcontainer-run composite action
  DEVCONTAINER_IMAGE: ghcr.io/ff-fab/cosalette-apps-devcontainer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Build ${{ inputs.app }} docs inside devcontainer
        uses: ./.github/actions/devcontainer-run
        with:
          run-cmd: task ${{ inputs.app }}:docs:build
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload docs artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: docs-${{ inputs.app }}
          path: apps/${{ inputs.app }}/site
          retention-days: 1
