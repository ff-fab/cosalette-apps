name: Release Please
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build Docker images for each released app
  docker-matrix:
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        env:
          RELEASE_OUTPUTS: ${{ toJSON(needs.release.outputs) }}
        run: |
          matrix=$(echo "$RELEASE_OUTPUTS" | jq -c '. as $out | {
            include: [
              (.paths_released | fromjson)[] |
              . as $path |
              {
                app: ($path | split("/") | last),
                version: $out[$path + "--version"]
              }
            ]
          }' || echo '')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  docker:
    needs: docker-matrix
    if: needs.docker-matrix.outputs.matrix != ''
    strategy:
      matrix: ${{ fromJSON(needs.docker-matrix.outputs.matrix) }}
    uses: ./.github/workflows/docker-app.yml
    with:
      app: ${{ matrix.app }}
      version: ${{ matrix.version }}
