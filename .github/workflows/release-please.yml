name: Release Please
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      docker_matrix: ${{ steps.docker-matrix.outputs.matrix }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - id: docker-matrix
        if: steps.release.outputs.releases_created == 'true'
        env:
          RELEASE_OUTPUTS: ${{ toJSON(steps.release.outputs) }}
        run: |
          matrix=$(echo "$RELEASE_OUTPUTS" | jq -c '. as $out | {
            include: [
              (.paths_released | fromjson)[] |
              . as $path |
              {
                app: ($path | split("/") | last),
                version: $out[$path + "--version"]
              }
            ]
          }' || echo '')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # Build Docker images for each released app
  docker:
    needs: release
    if: needs.release.outputs.docker_matrix != ''
    strategy:
      matrix: ${{ fromJSON(needs.release.outputs.docker_matrix) }}
    uses: ./.github/workflows/docker-app.yml
    with:
      app: ${{ matrix.app }}
      version: ${{ matrix.version }}
