name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.filter.outputs.changes }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/**'
              - 'taskfiles/**'
              - '.pre-commit-config.yaml'
              - 'REUSE.toml'
            # Per-app filters added as apps are migrated:
            gas2mqtt:
              - 'apps/gas2mqtt/**'

  # Shared infrastructure check (REUSE, pre-commit on shared files)
  shared:
    needs: detect
    if: needs.detect.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev
      - run: uv run reuse lint

  # Per-app CI dispatched via matrix
  app-ci:
    needs: detect
    if: needs.detect.outputs.changes != '[]'
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.changes) }}
      fail-fast: false
    uses: ./.github/workflows/ci-app.yml
    with:
      app: ${{ matrix.app }}
