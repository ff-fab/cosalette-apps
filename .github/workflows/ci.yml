name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  DEVCONTAINER_IMAGE: ghcr.io/ff-fab/cosalette-apps-devcontainer

jobs:
  detect:
    # Skip full CI for release-please PRs — they only change changelogs and
    # version numbers, which were already tested on main. When detect is
    # skipped, shared and app-ci are skipped too, and ci-gate auto-passes.
    # The actor check prevents humans from bypassing CI by naming a branch
    # with the release-please-- prefix.
    if: >-
      github.event_name == 'push'
      || github.actor != 'ff-fab-release-bot[bot]'
      || !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.apps.outputs.apps }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # Discover all apps from apps/*/pyproject.toml
      - name: Discover apps
        id: discover
        run: |
          apps=$(ls -d apps/*/pyproject.toml 2>/dev/null | xargs -I{} dirname {} | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "apps=$apps" >> "$GITHUB_OUTPUT"

      # Build dorny/paths-filter config dynamically from discovered apps
      - name: Build path filters
        id: build-filters
        run: |
          filters="shared:"$'\n'"  - 'pyproject.toml'"$'\n'"  - 'uv.lock'"$'\n'"  - '.github/**'"$'\n'"  - 'taskfiles/**'"$'\n'"  - '.pre-commit-config.yaml'"$'\n'"  - 'REUSE.toml'"
          filters="$filters"$'\n'"  - 'Taskfile.yml'"$'\n'"  - 'scripts/**'"$'\n'"  - 'packages/**'"
          for app in $(echo '${{ steps.discover.outputs.apps }}' | jq -r '.[]'); do
            filters="$filters"$'\n'"${app}:"$'\n'"  - 'apps/${app}/**'"
          done
          echo "$filters" > /tmp/path-filters.yml

      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050  # v3
        id: filter
        with:
          filters: /tmp/path-filters.yml

      - name: Build app list (exclude non-app filters)
        id: apps
        run: |
          # dorny/paths-filter outputs a JSON array of all matched filter names.
          # Remove 'shared' since it is not an app — it has its own dedicated job.
          apps=$(echo '${{ steps.filter.outputs.changes }}' | jq -c '[.[] | select(. != "shared")]')
          echo "apps=$apps" >> "$GITHUB_OUTPUT"

  # Shared infrastructure check (REUSE, pre-commit on shared files)
  shared:
    needs: detect
    if: needs.detect.outputs.shared == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Run shared checks inside devcontainer
        uses: ./.github/actions/devcontainer-run
        with:
          run-cmd: task reuse:lint
          token: ${{ secrets.GITHUB_TOKEN }}

  # Security audit — runs on shared or app changes to catch workflow/dep/source issues
  security:
    needs: detect
    if: needs.detect.outputs.shared == 'true' || needs.detect.outputs.apps != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Run security audit inside devcontainer
        uses: ./.github/actions/devcontainer-run
        with:
          run-cmd: task security:audit
          token: ${{ secrets.GITHUB_TOKEN }}

  # Per-app CI dispatched via matrix
  app-ci:
    needs: detect
    if: needs.detect.outputs.apps != '[]'
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
      fail-fast: false
    uses: ./.github/workflows/ci-app.yml
    with:
      app: ${{ matrix.app }}

  # Merge gate — the single required status check for branch protection.
  # Always runs; passes when all upstream jobs succeed or are skipped.
  ci-gate:
    needs: [shared, security, app-ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream results
        run: |
          if [[ "${{ needs.shared.result }}" == "failure" || "${{ needs.shared.result }}" == "cancelled" ]]; then
            echo "shared job failed or was cancelled"
            exit 1
          fi
          if [[ "${{ needs.security.result }}" == "failure" || "${{ needs.security.result }}" == "cancelled" ]]; then
            echo "security job failed or was cancelled"
            exit 1
          fi
          if [[ "${{ needs.app-ci.result }}" == "failure" || "${{ needs.app-ci.result }}" == "cancelled" ]]; then
            echo "app-ci job failed or was cancelled"
            exit 1
          fi
          echo "All checks passed or were skipped"
