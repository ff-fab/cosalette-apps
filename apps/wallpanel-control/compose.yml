services:
  wallpanel-control:
    build:
      context: ../..
      dockerfile: apps/wallpanel-control/Dockerfile
    image: ghcr.io/ff-fab/wallpanel-control:latest
    restart: unless-stopped
    # env_file imports all WALLPANEL_CONTROL_* settings from .env.
    # Move the MQTT password to a Docker secret in production deployments
    # where environment variable exposure is a concern.
    # NOTE: HOST_WALLPANEL_SSH_KEY_PATH and HOST_WALLPANEL_KNOWN_HOSTS_PATH
    # are Compose interpolation variables — export them in your shell or
    # set them in a separate file, NOT in .env, to avoid injecting host
    # filesystem paths into the container environment.
    env_file: .env
    environment:
      WALLPANEL_CONTROL_MQTT__HOST: mosquitto
      WALLPANEL_CONTROL_SSH_KEY_PATH: /run/secrets/wallpanel_ssh_key
      WALLPANEL_CONTROL_SSH_KNOWN_HOSTS: /run/secrets/wallpanel_known_hosts
    volumes:
      - wallpanel_control-data:/app/data
    secrets:
      - wallpanel_ssh_key
      - wallpanel_known_hosts
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - '127.0.0.1:1883:1883'
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

volumes:
  wallpanel_control-data:
  mosquitto-data:
  mosquitto-log:

# The SSH private key is mounted as a Docker secret (tmpfs, service-scoped,
# ephemeral) rather than a bind-mount volume, which keeps the key off the
# container filesystem and invisible to other services.
# The SSH known_hosts file seeds host-key verification for the container
# user's trust store (/home/appuser/.ssh/known_hosts).
# Set HOST_WALLPANEL_SSH_KEY_PATH / HOST_WALLPANEL_KNOWN_HOSTS_PATH in your
# shell (not in .env) to override these paths.
secrets:
  wallpanel_ssh_key:
    file: ${HOST_WALLPANEL_SSH_KEY_PATH:-${HOME}/.ssh/wallpanel}
  wallpanel_known_hosts:
    file: ${HOST_WALLPANEL_KNOWN_HOSTS_PATH:-${HOME}/.ssh/known_hosts}
