[project]
site_name = "airthings2mqtt"
site_description = "Reads Airthings Wave air quality sensors over BLE and publishes temperature, humidity, and radon data to MQTT."
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/version-fetch.js", "javascripts/header-breadcrumb.js", "javascripts/palette-sync.js"]

# Explicit nav keeps planning/ pages out of the navigation.
# Zensical does not support exclude_docs — explicit nav is the workaround.
nav = [
    { "Home" = "index.md" },
    { "Getting Started" = "getting-started.md" },
    { "Configuration" = "configuration.md" },
    { "MQTT Topics" = "mqtt-topics.md" },
    { "ADRs" = "adr/" },
]
