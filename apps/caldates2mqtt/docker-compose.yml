services:
  caldates2mqtt:
    build:
      context: ../..
      dockerfile: apps/caldates2mqtt/Dockerfile
    restart: unless-stopped
    volumes:
      - caldates2mqtt-data:/app/data
    environment:
      CALDATES2MQTT_MQTT__HOST: mosquitto
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - '127.0.0.1:1883:1883'
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-config:/mosquitto/config

volumes:
  caldates2mqtt-data:
  mosquitto-data:
  mosquitto-config:
