asyncapi: 3.0.0
info:
  title: gas2mqtt
  version: 0.1.1
  x-cosalette-contract-version: '1'
channels:
  consumptionCommand:
    address: gas2mqtt/consumption/set
    messages:
      message:
        payload:
          additionalProperties: true
          type: object
    x-cosalette-archetype: command
    x-cosalette-summary: Override the accumulated consumption_m3 value for the gas
      counter
    x-cosalette-effects: &id001
    - Updates consumption_m3 in the shared GasCounterState
    - Persists new consumption_m3 to JsonFileStore immediately
    - Publishes updated gas counter state to MQTT
  consumptionState:
    address: gas2mqtt/consumption/state
    messages:
      message:
        payload:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
    x-cosalette-archetype: command
    x-cosalette-summary: Override the accumulated consumption_m3 value for the gas
      counter
    x-cosalette-effects: *id001
  gas_counterState:
    address: gas2mqtt/gas_counter/state
    messages:
      message:
        payload:
          type: object
    x-cosalette-archetype: telemetry
    x-cosalette-summary: 'Domestic gas meter counter: pulse counting via QMC5883L
      Schmitt trigger detection'
    x-cosalette-behavior:
    - Read 3-axis magnetic field from QMC5883L via MagnetometerPort
    - Feed Bz value through SchmittTrigger for hysteresis-based edge detection
    - "Increment counter on rising edge (LOW\u2192HIGH transition)"
    - "Optionally increment ConsumptionTracker by liters_per_tick/1000 m\xB3"
    - Stage updated counter and consumption_m3 to DeviceStore with explicit save
    x-cosalette-effects:
    - Publishes counter, trigger state, and optionally consumption_m3 to MQTT
    - Persists counter and consumption_m3 to JsonFileStore on every state change
  magnetometerState:
    address: gas2mqtt/magnetometer/state
    messages:
      message:
        payload: &id002
          additionalProperties: true
          type: object
    x-cosalette-archetype: telemetry
  temperatureState:
    address: gas2mqtt/temperature/state
    messages:
      message:
        payload: *id002
    x-cosalette-archetype: telemetry
operations:
  publishConsumptionState:
    action: send
    channel:
      $ref: '#/channels/consumptionState'
    summary: Override the accumulated consumption_m3 value for the gas counter
  publishGasCounterState:
    action: send
    channel:
      $ref: '#/channels/gas_counterState'
    summary: 'Domestic gas meter counter: pulse counting via QMC5883L Schmitt trigger
      detection'
  publishMagnetometerState:
    action: send
    channel:
      $ref: '#/channels/magnetometerState'
  publishTemperatureState:
    action: send
    channel:
      $ref: '#/channels/temperatureState'
  receiveConsumptionCommand:
    action: receive
    channel:
      $ref: '#/channels/consumptionCommand'
    summary: Override the accumulated consumption_m3 value for the gas counter
x-cosalette-enforcement:
  mode: warn
  on_configure: true
  on_publish: false
  network_level: false
